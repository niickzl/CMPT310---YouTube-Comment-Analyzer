<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div class="header">
    <img class="header-icon" src="icons/YTCA.png" alt="icon">
    <div class="brand-wrap">
      <div class="brand">YT Comment Analyzer</div>
      <div class="brand-sub">AI-powered YouTube comment insights</div>
    </div>
  </div>

  <div class="video-section">
    <div class="label">Currently On</div>
    <div class="video-title loading" id="videoTitle">Detecting video...</div>
  </div>

  <div class="divider"></div>

  <!-- Sentiment Overview -->
  <div class="dashboard-section">
    <div class="section-label">Sentiment Overview</div>
    <div class="sentiment-row">
      <div class="sentiment-card positive">
        <div class="s-icon">↑</div>
        <div class="s-val" id="posVal">—</div>
        <div class="s-label">Positive</div>
      </div>
      <div class="sentiment-card negative">
        <div class="s-icon">↓</div>
        <div class="s-val" id="negVal">—</div>
        <div class="s-label">Negative</div>
      </div>
    </div>
    <div class="sentiment-bar-wrap">
      <div class="bar-track">
        <div class="bar-fill" id="sentimentBar"></div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Thematic Clusters -->
  <div class="cluster-section">
    <div class="section-label">Thematic Clusters</div>
    <div class="clusters">

      <div class="cluster-item">
        <div class="cluster-left">
          <div class="cluster-dot" style="background:#7c6af7;"></div>
          <div class="cluster-name">Content</div>
        </div>
        <div class="cluster-bar-track">
          <div class="cluster-bar-fill" id="bar-content" style="background:#7c6af7;"></div>
        </div>
        <div class="cluster-pct" id="pct-content">—</div>
      </div>

      <div class="cluster-item">
        <div class="cluster-left">
          <div class="cluster-dot" style="background:#ffd740;"></div>
          <div class="cluster-name">Technical</div>
        </div>
        <div class="cluster-bar-track">
          <div class="cluster-bar-fill" id="bar-technical" style="background:#ffd740;"></div>
        </div>
        <div class="cluster-pct" id="pct-technical">—</div>
      </div>

      <div class="cluster-item">
        <div class="cluster-left">
          <div class="cluster-dot" style="background:#40c4ff;"></div>
          <div class="cluster-name">General</div>
        </div>
        <div class="cluster-bar-track">
          <div class="cluster-bar-fill" id="bar-general" style="background:#40c4ff;"></div>
        </div>
        <div class="cluster-pct" id="pct-general">—</div>
      </div>

    </div>
  </div>

  <div class="divider"></div>

  <!-- Scanned Comments -->
  <div class="comments-section">
    <div class="comments-header">
      <div class="section-label">Scanned Comments</div>
      <div class="page-info" id="pageInfo">—</div>
    </div>
    <div class="comments-list" id="commentsList">
      <div class="comments-empty">Comments will appear after analysis.</div>
    </div>
    <div class="pagination">
      <button class="page-btn" id="prevBtn" disabled>&#8592;</button>
      <div class="page-dots" id="pageDots"></div>
      <button class="page-btn" id="nextBtn" disabled>&#8594;</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="footer">
    <button class="analyze-btn" id="analyzeBtn">Analyze Comments</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
